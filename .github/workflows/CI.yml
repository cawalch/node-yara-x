name: CI
env:
  DEBUG: napi:*
  APP_NAME: yara-x
  MACOSX_DEPLOYMENT_TARGET: "10.13"
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
permissions:
  contents: read
"on":
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - docs/**
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "index.js"
      - "index.d.ts"
      - "build.rs"
      - ".github/workflows/CI.yml"
  release:
    types: [published]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.set-matrix.outputs.build_matrix }}
      test_matrix: ${{ steps.set-matrix.outputs.test_matrix }}
    steps:
      - id: set-matrix
        run: |
          # Define x64 targets (Linux, Windows, macOS)
          X64_TARGETS='[
            {
              "host": "macos-latest",
              "target": "x86_64-apple-darwin",
              "build": "pnpm build --target x86_64-apple-darwin"
            },
            {
              "host": "ubuntu-latest",
              "target": "x86_64-unknown-linux-gnu",
              "build": "pnpm build --target x86_64-unknown-linux-gnu --use-napi-cross"
            },
            {
              "host": "windows-latest",
              "target": "x86_64-pc-windows-msvc",
              "build": "pnpm build --target x86_64-pc-windows-msvc"
            }
          ]'

          # Define ARM/Cross targets
          ARM_TARGETS='[
            {
              "host": "macos-latest",
              "target": "aarch64-apple-darwin",
              "build": "pnpm build --target aarch64-apple-darwin"
            },
            {
              "host": "windows-latest",
              "target": "aarch64-pc-windows-msvc",
              "build": "pnpm build --target aarch64-pc-windows-msvc"
            },
            {
              "host": "ubuntu-latest",
              "target": "aarch64-unknown-linux-gnu",
              "build": "pnpm build --target aarch64-unknown-linux-gnu --use-napi-cross"
            }
          ]'

          # Test matrix for x64
          TEST_X64='[
            { "host": "macos-latest", "target": "x86_64-apple-darwin", "architecture": "x64" },
            { "host": "ubuntu-latest", "target": "x86_64-unknown-linux-gnu", "architecture": "x64" },
            { "host": "windows-latest", "target": "x86_64-pc-windows-msvc", "architecture": "x64" }
          ]'

          # Test matrix for ARM
          TEST_ARM='[
            { "host": "macos-latest", "target": "aarch64-apple-darwin", "architecture": "arm64" }
          ]'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR: Only x64
            BUILD_MATRIX=$(echo "$X64_TARGETS" | jq -c .)
            TEST_MATRIX=$(echo "$TEST_X64" | jq -c .)
          else
            # Push/Release: All targets
            BUILD_MATRIX=$(jq -n -c --argjson x64 "$X64_TARGETS" --argjson arm "$ARM_TARGETS" '$x64 + $arm')
            TEST_MATRIX=$(jq -n -c --argjson x64 "$TEST_X64" --argjson arm "$TEST_ARM" '$x64 + $arm')
          fi

          echo "build_matrix={\"settings\":$BUILD_MATRIX}" >> $GITHUB_OUTPUT
          echo "test_matrix={\"settings\":$TEST_MATRIX,\"node\":[\"20\",\"22\"]}" >> $GITHUB_OUTPUT
  build:
    needs: setup
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}
    name: stable - ${{ matrix.settings.target }} - node@20
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.18.0
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c # v2.7.7
        with:
          shared-key: ${{ matrix.settings.target }}-${{ matrix.settings.host }}
          cache-directories: |
            ~/.napi-rs
            .cargo-cache
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify Cargo lockfile
        run: cargo metadata --locked --format-version 1
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: "*.node"
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: "*.node"
          if-no-files-found: error
  test-bindings:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    permissions:
      contents: read
    needs:
      - setup
      - build
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.test_matrix) }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.18.0
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          architecture: ${{ matrix.settings.architecture }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        run: pnpm test
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: main
    permissions:
      contents: write
      id-token: write
    needs:
      - build
      - test-bindings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10.18.0
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.14.0
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Update npm
        run: npm install --global npm@^11.5.1
      - name: Print publish toolchain
        run: |
          node --version
          npm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: create npm dirs
        run: pnpm napi create-npm-dirs
      - name: Move artifacts
        run: pnpm artifacts
      - name: List packages
        run: ls -R ./npm
        shell: bash
      - name: Publish platform sub-packages
        # Publish each platform-specific sub-package from ./npm/*
        # Uses OIDC trusted publishing (no NPM_TOKEN needed).
        # --ignore-scripts prevents prepublishOnly from re-running napi prepublish
        # which would attempt to re-create the GitHub release and fail with 422.
        run: |
          TAG_ARGS=""
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            TAG_ARGS="--tag next"
          fi
          for pkg_dir in ./npm/*/; do
            echo "Publishing $pkg_dir"
            npm publish "$pkg_dir" $TAG_ARGS --access public --provenance --ignore-scripts
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish main package
        # Publish root package last (--ignore-scripts skips prepublishOnly / napi prepublish
        # which would try to create a GitHub release that already exists).
        run: |
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            npm publish --tag next --access public --provenance --ignore-scripts
          else
            npm publish --access public --provenance --ignore-scripts
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
